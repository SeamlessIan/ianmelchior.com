<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 2rem;
            background-color: #fdfdfd;
        }

        .site-nav {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 4rem;
        }

        .site-nav a {
            color: #333;
            text-decoration: none;
            font-size: 1.2rem;
            font-weight: 400;
            transition: all 0.2s ease;
            padding-bottom: 0.2rem;
            border-bottom: 2px solid transparent;
        }

        .site-nav a:hover {
            border-bottom: 2px solid #333;
        }

        h1 {
            font-size: 2rem;
            font-weight: 500;
            margin-bottom: 2.5rem;
            text-align: center;
            color: #222;
        }

        .form-wrapper {
            max-width: 640px;
            margin: 0 auto;
        }

        #zf_div_B0hqRQW2u-C4WPB8Z4zjBZXyf2StDpb0-gyAweOe0yw iframe {
            width: 100%;
            border: none;
            transition: height 0.3s ease;
        }

        @media (max-width: 700px) {
            .site-nav {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="site-nav">
        <a href="/work">Work</a>
        <a href="/contact">Contact</a>
    </nav>

    <h1>Contact</h1>

    <div class="form-wrapper">
        <div id='zf_div_B0hqRQW2u-C4WPB8Z4zjBZXyf2StDpb0-gyAweOe0yw'></div>
    </div>

    <script>
        (function() {
            var formId = 'B0hqRQW2u-C4WPB8Z4zjBZXyf2StDpb0-gyAweOe0yw';
            var divId = 'zf_div_' + formId;
            var ifrId = 'zf_ifrm_' + formId;

            var ifr = document.createElement('iframe');
            ifr.id = ifrId;
            ifr.src = 'https://forms.zohopublic.com/ianmelchior1/form/ianmelchiorcomContactForm/formperma/' + formId;
            ifr.setAttribute('aria-label', 'Contact form');
            ifr.setAttribute('allowfullscreen', true);
            ifr.style.border = 'none';
            ifr.style.width = '100%';
            ifr.style.height = '540px';

            document.getElementById(divId).appendChild(ifr);

            window.addEventListener('message', function(e) {
                var ifrm = document.getElementById(ifrId);
                if (ifrm && e.source === ifrm.contentWindow) {
                    var parts = e.data.split('|');
                    if (ifrm.src.includes('formperma') && ifrm.src.includes(parts[0])) {
                        ifrm.style.height = (parseInt(parts[1], 10) + 15) + 'px';
                    }
                }
            }, false);
        })();
    </script>
</body>
</html>
